<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width">
        <title>Choose Your Path!</title>
        <link rel="stylesheet" href="gameStyle.css">
        <script defer src="gameScript.js"></script>
    </head>
    <body class="theBg">
        <audio id="my_audio2" src="assets/jazzPartTwo.mp3" loop="loop"></audio>

        <img src="assets/gigPerson.png" class="gigGuy">

        <h1 class = "manSpeaking">A chord will be described. Your job is to "play" it correctly by typing the chord into the input box. Use lowercase only and no spaces. For example: dminor, cmajor, e7, emajor7....    
            Your First Chord: "D, F, A"
        </h1>

        <input class = "chords" placeholder = "Type Chord Here">
        <div class = "button-classes">
            <button class = "button5"> Play the chord </button>
            <button class = "yes">You bet I will! (Thanks for playing, you've won! By clicking this, the game will reset!)</button>
        </div>    
        
        <div class = "bottom">
            <a href = "index.html" class = "link">Click to go back to the first form and reset</a>
            <button class = "skipButton">Skip to the end (assuming you can't complete this)!</button>
        </div>
      
    </body>
</html>
